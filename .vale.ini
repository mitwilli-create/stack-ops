# Vale config, prose linting wired to Mitchell's Voice OS rules.
# Run: vale --glob='!node_modules/**' .   Install: brew install vale.
# Do NOT run `vale docs/` alone; it leaves README.md and skills/ unchecked.
StylesPath = styles
MinAlertLevel = suggestion

# Cursor rules files are Markdown. Without this mapping Vale treats .mdc as
# plaintext, which silently disables the <!-- vale Rule = NO --> toggles.
[formats]
mdc = md

[*.{md,mdc,txt}]
BasedOnStyles = VoiceOS

# private/ holds internal notes, not outward materials. The em-dash and
# anti-slop rules govern published prose; linting the private layer only
# trains you to ignore the linter.
[private/**]
BasedOnStyles = 
